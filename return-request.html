<!DOCTYPE html>
<html>
<head>
<title>Return Request</title>

<style>
body {
  font-family: Arial;
  background:#f6f6f7;
  padding:10px;
  margin:0;
}

h2 {
  text-align:center;
  font-size:18px;
}

/* Tabs */
.tabs {
  text-align:center;
  margin-bottom:10px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.tabs button {
  padding:8px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#e5e7eb;
  font-size:12px;
}

.tabs button.active {
  background:#111;
  color:#fff;
}

/* Table */
table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
}

th, td {
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:12px;
  text-align:left;
}

th {
  background:#f1f2f4;
}

/* Buttons */
.btn {
  padding:6px 10px;
  margin:2px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:11px;
}

.pickup { background:#e3f1df; }
.received { background:#dbeafe; }
.ship { background:#ede9fe; }
.done { background:#f3f4f6; }
.undo { background:#fdecea; color:#c62828; }
.delete { background:#000; color:#fff; }

/* 🔥 MOBILE CARD VIEW */
@media (max-width: 768px) {

  table, thead, tbody, th, td, tr {
    display:block;
  }

  thead {
    display:none;
  }

  tr {
    background:#fff;
    margin-bottom:12px;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
  }

  td {
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border:none;
    font-size:12px;
  }

  td::before {
    content: attr(data-label);
    font-weight:bold;
    color:#555;
  }

  .btn {
    margin-top:5px;
  }

}

</style>
</head>

<body>

<h2>R&E Management System</h2>
<button onclick="refreshPage()" style="
position:fixed;
top:10px;
right:10px;
padding:8px 12px;
background:#007bff;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
z-index:999;
">
🔄 Refresh
</button>
<div class="tabs" id="tabs">
  <button data-tab="pending" class="active">Active</button>
  <button data-tab="pickup_generated">Pickup</button>
  <button data-tab="received">Received</button>
  <button data-tab="exchange_shipped">Shipped</button>
  <button data-tab="completed">Completed</button>
  <button data-tab="deleted">Deleted</button>
</div>

<div class="table-container">
  <table id="table"></table>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxDZGsw-h-uo2EnxAzKgqADOq6X9Tm8QxFoFZgip5t40Bfs4j7QSOzhXRbo2chyNZ7X6w/exec";

let currentTab = "pending";
let interval;

// TAB CLICK
document.querySelectorAll("#tabs button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    setTab(btn.dataset.tab);
  });
});

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll("#tabs button").forEach(b=>b.classList.remove("active"));
  document.querySelector(`[data-tab="${tab}"]`).classList.add("active");

  loadData();
}

// DATE FORMAT
function formatDate(dateStr){
  if(!dateStr) return "";
  let d = new Date(dateStr);
  if(isNaN(d)) return dateStr;

  return d.toLocaleDateString("en-IN", {
    timeZone: "Asia/Kolkata",
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

// TIME FORMAT
function formatTime(timeStr){
  if(!timeStr) return "";
  let d = new Date(timeStr);
  if(isNaN(d)) return timeStr;

  return d.toLocaleTimeString("en-IN", {
    timeZone: "Asia/Kolkata",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// LOAD DATA
async function loadData(){
  try{
    let res = await fetch(API);
    let data = await res.json();

    if(!Array.isArray(data)){
      document.getElementById("table").innerHTML = "❌ Invalid data";
      return;
    }

    let html = `
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Email</th>
<th>Order</th>
<th>Type</th>
<th>Reason</th>
<th>Status</th>
<th>Duplicate</th>
<th>Action</th>
</tr>
</thead>
<tbody>
`;

    data.forEach(item=>{

      // TAB FILTER
      if(currentTab === "completed"){
        if(item.status !== "completed" && item.status !== "refunded") return;
      } else {
        if(item.status !== currentTab) return;
      }

      html += `
<tr>
<td data-label="Date">${formatDate(item.date)}</td>
<td data-label="Time">${formatTime(item.time)}</td>
<td data-label="ID">${item.request_id || ""}</td>
<td data-label="Name">${item.name || ""}</td>
<td data-label="Mobile">${item.mobile || ""}</td>
<td data-label="Email">${item.email || ""}</td>
<td data-label="Order">${item.order_id || ""}</td>
<td data-label="Type">${item.type || ""}</td>
<td data-label="Reason">${item.reason || ""}</td>
<td data-label="Status">${item.status || ""}</td>
<td data-label="Duplicate">${item.duplicate || ""}</td>
<td data-label="Action">
  ${nextButton(item)}
  ${undoButton(item)}
  ${deleteButton(item)}
</td>
</tr>`;
    });

    html += `</tbody>`;
    document.getElementById("table").innerHTML = html;

  }catch(err){
    console.error(err);
    document.getElementById("table").innerHTML = "❌ Failed to load data";
  }
}

// NEXT ACTION BUTTON
function nextButton(item){

  if(item.status === "pending"){
    return `<button class="btn pickup" onclick="action('${item.request_id}','pickup_generated')">Pickup</button>`;
  }

  if(item.status === "pickup_generated"){
    return `<button class="btn received" onclick="action('${item.request_id}','received')">Received</button>`;
  }

  if(item.status === "received"){
    if(item.type === "exchange"){
      return `<button class="btn ship" onclick="action('${item.request_id}','exchange_shipped')">Shipped</button>`;
    }
    if(item.type === "return"){
      return `<button class="btn done" onclick="action('${item.request_id}','refunded')">Refund</button>`;
    }
  }

  if(item.status === "exchange_shipped"){
    return `<button class="btn done" onclick="action('${item.request_id}','completed')">Complete</button>`;
  }

  return "";
}

// DELETE BUTTON
function deleteButton(item){
  if(item.status === "pending"){
    return `<button class="btn delete" onclick="action('${item.request_id}','deleted')">Delete</button>`;
  }
  return "";
}

// UNDO BUTTON
function undoButton(item){

  let prev = "";

  if(item.status === "pickup_generated") prev = "pending";
  else if(item.status === "received") prev = "pickup_generated";
  else if(item.status === "exchange_shipped") prev = "received";
  else if(item.status === "completed") prev = "exchange_shipped";
  else if(item.status === "refunded") prev = "received";
  else if(item.status === "deleted") prev = "pending";

  if(prev === "") return "";

  return `<button class="btn undo" onclick="action('${item.request_id}','${prev}')">Undo</button>`;
}

// ACTION HANDLER
async function action(id, status){

  let msg = (status === "deleted") 
    ? "Delete this request?" 
    : "Proceed to next step?";

  if(!confirm(msg)) return;

  try{
    clearInterval(interval);

    await updateStatus(id, status);

    await loadData();

    interval = setInterval(loadData, 5000);

  }catch(err){
    console.error(err);
    alert("❌ Action failed");
  }
}

// API UPDATE
async function updateStatus(id, status){

  let res = await fetch(API, {
    method:"POST",
    body: JSON.stringify({
      action:"update",
      request_id:id,
      status:status
    })
  });

  let json = await res.json();

  if(json.status !== "updated"){
    alert("❌ Update failed");
  }
}

// INIT
loadData();
interval = setInterval(loadData, 5000);
//HTML REFRESH
  function refreshPage(){

  // ✅ Return Request Page
  if (typeof loadData === "function") {
    loadData();
    console.log("Return data refreshed");
  }

  // ✅ Scanner Dashboard
  if (typeof loadDashboard === "function") {
    loadDashboard();
    console.log("Dashboard refreshed");
  }

  // ✅ Tracking Page
  if (typeof trackOrder === "function" && trackingData) {
    trackOrder();
    console.log("Tracking refreshed");
  }

  // ✅ Extra safety (agar kuch bhi na mile)
  if (
    typeof loadData !== "function" &&
    typeof loadDashboard !== "function"
  ){
    console.log("Fallback reload");
    location.reload(); // last option
  }
}
</script>

</body>
</html>
