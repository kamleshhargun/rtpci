<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI';
}

/* ===== LAYOUT ===== */
body{
  display:flex;
  height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;
  background:#1f2937;
  color:#fff;
  padding:15px;
}

.sidebar h2{
  text-align:center;
  margin-bottom:20px;
}

.menu a{
  display:block;
  padding:10px;
  margin-bottom:8px;
  text-decoration:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.menu a:hover,
.menu a.active{
  background:#007bff;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.header{
  background:#fff;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* ===== IFRAME ===== */
iframe{
  flex:1;
  width:100%;
  border:none;
}

/* ===== MOBILE FIX ===== */
@media(max-width:768px){
  .sidebar{
    width:70px;
  }

  .menu a{
    font-size:12px;
    padding:8px;
    text-align:center;
  }

  .sidebar h2{
    font-size:14px;
  }
}
</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

  <h2>📦 ERP</h2>

  <div class="menu">
    <a class="active" onclick="openPage('index.html', this)">Home</a>
    <a onclick="openPage('daily.html', this)">Daily Scan</a>
    <a onclick="openPage('production.html', this)">Production</a>
    <a onclick="openPage('return-request.html', this)">Return Request</a>
  </div>

</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <div class="header">
    <h3 id="title">Dashboard</h3>
  </div>

  <iframe id="frame" src="index.html"></iframe>

</div>

<script>

function openPage(page, el){

  // 🔥 PAGE LOAD
  document.getElementById("frame").src = page;

  // 🔥 ACTIVE MENU
  document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
  el.classList.add("active");

  // 🔥 TITLE CHANGE
  document.getElementById("title").innerText = el.innerText;

}

</script>

</body>
</html>
