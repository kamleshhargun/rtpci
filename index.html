<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI';
}

/* ===== LAYOUT ===== */
body{
  display:flex;
  height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;
  background:#1f2937;
  color:#fff;
  padding:15px;
}

.sidebar h2{
  text-align:center;
  margin-bottom:20px;
}

.menu a{
  display:block;
  padding:10px;
  margin-bottom:8px;
  text-decoration:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.menu a:hover,
.menu a.active{
  background:#007bff;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
.header{
  background:#fff;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* ===== DASHBOARD ===== */
.dashboard{
  padding:20px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
}

.card h3{
  margin-bottom:10px;
}

.big{
  font-size:24px;
  font-weight:bold;
  color:#007bff;
}

/* ===== IFRAME ===== */
iframe{
  flex:1;
  width:100%;
  border:none;
  display:none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .sidebar{
    width:70px;
  }
}
</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

  <h2>📦 ERP</h2>

  <div class="menu">
    <a class="active" onclick="showHome(this)">Home</a>
    <a onclick="openPage('daily.html', this)">Daily Scan</a>
    <a onclick="openPage('production.html', this)">Production</a>
    <a onclick="openPage('return-request.html', this)">Return Request</a>
  </div>

</div>

<!-- ===== MAIN ===== -->
<div class="main">

  <div class="header">
    <h3 id="title">Dashboard</h3>
  </div>

  <!-- ===== DASHBOARD (DEFAULT VIEW) ===== -->
  <div id="home" class="dashboard">

    <div class="card">
      <h3>📦 Today Pickup</h3>
      <div class="big" id="pickup">120</div>
    </div>

    <div class="card">
      <h3>🔁 Today Return</h3>
      <div class="big" id="return">25</div>
    </div>

    <div class="card">
      <h3>📊 Total Orders</h3>
      <div class="big">850</div>
    </div>

    <div class="card">
      <h3>🚚 In Transit</h3>
      <div class="big">310</div>
    </div>

    <div class="card">
      <h3>💰 Revenue</h3>
      <div class="big">₹1.2L</div>
    </div>

  </div>

  <!-- ===== IFRAME ===== -->
  <iframe id="frame"></iframe>

</div>

<script>

// ===== OPEN PAGE =====
function openPage(page, el){

  document.getElementById("frame").style.display = "block";
  document.getElementById("home").style.display = "none";

  document.getElementById("frame").src = page;

  document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("title").innerText = el.innerText;
}

// ===== HOME =====
function showHome(el){

  document.getElementById("frame").style.display = "none";
  document.getElementById("home").style.display = "grid";

  document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("title").innerText = "Dashboard";
}

</script>

</body>
</html>
