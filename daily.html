<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: 'Segoe UI', Arial;
  background: linear-gradient(135deg, #eef2f7, #dfe9f3);
  margin: 0;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.start{background:#28a745;color:#fff;}
.stop{background:#dc3545;color:#fff;}
.manual{background:#444;color:#fff;}
.search{background:#6f42c1;color:#fff;}

.mode-btn{background:#eee;}
.mode-btn.active{background:#007bff;color:#fff;}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.stat{display:flex;justify-content:space-between;}
.stat div{flex:1;background:#f8f9fa;margin:3px;padding:8px;border-radius:8px;}
.stat span{font-weight:bold;color:#007bff;}

#manualBox,#extraBox,#saveBtn{display:none;}
</style>
</head>

<body>

<div class="container">

<h2>📦 ERP Daily System</h2>

<button onclick="refreshPage()">🔄 Refresh</button>

<!-- ================= DASHBOARD ================= -->
<div class="card">
<h3>📊 Dashboard</h3>

<div class="stat">
<div>Pickup <span id="pickup_today">0</span></div>
<div>Return <span id="return_today">0</span></div>
</div>

<div class="stat">
<div>Y Pickup <span id="pickup_yesterday">0</span></div>
<div>Y Return <span id="return_yesterday">0</span></div>
</div>

<div class="stat">
<div>Total P <span id="pickup_total">0</span></div>
<div>Total R <span id="return_total">0</span></div>
</div>
</div>

<!-- ================= MODE ================= -->
<div class="card">
<button id="pickupBtn" class="mode-btn active" onclick="setMode('Pickup')">Pickup</button>
<button id="returnBtn" class="mode-btn" onclick="setMode('Return')">Return</button>
</div>

<!-- ================= SCANNER ================= -->
<div class="card">
<div id="reader"></div>

<button class="start" onclick="startOrder()">Start</button>
<button class="stop" onclick="stopScan()">Stop</button>
<button class="manual" onclick="openManual()">Manual</button>

<div id="status">Ready...</div>
</div>

<!-- MANUAL -->
<div class="card" id="manualBox">
<input id="manualOrder" placeholder="Order ID">
<input id="manualTracking" placeholder="Tracking ID">
<button onclick="submitManual()">Submit</button>
</div>

<!-- ================= LOOKUP ================= -->
<div class="card">
<h3>🔍 Lookup</h3>
<input id="lookupOrder" placeholder="Order ID">
<button class="search" onclick="lookup()">Search</button>
<div id="lookupResult">Enter Order</div>
</div>

<!-- ================= TRACKING ================= -->
<div class="card">
<h3>📦 Tracking</h3>

<input id="trackOrderId" placeholder="Order ID">
<input id="trackWaybill" placeholder="Tracking">

<button class="search" onclick="trackOrder()">Track</button>

<div id="trackResult"></div>

<div id="extraBox">
<label>Settled Amount</label>
<input id="settledAmount" readonly>

<label>Date</label>
<input type="date" id="settledDate">
</div>

<button id="saveBtn" class="start" onclick="saveTracking()">Save</button>
</div>

</div>

<script src="config.js"></script>

<script>

let html5QrCode, orderId="", mode="Pickup", trackingData=null;
let step="order";

const beep=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// ===== MODE =====
function setMode(m){
mode=m;
pickupBtn.classList.remove("active");
returnBtn.classList.remove("active");
(m==="Pickup"?pickupBtn:returnBtn).classList.add("active");
resetFlow();
}

// ===== SCAN FLOW =====
function startOrder(){

if(step==="order"){
html5QrCode=new Html5Qrcode("reader");

html5QrCode.start({facingMode:"environment"},{fps:20,qrbox:250},
text=>{
orderId=text;
stopScan();
status.innerText="Order Scanned ✅";
document.querySelector(".start").innerText="Next";
step="tracking";
});

}else{

html5QrCode=new Html5Qrcode("reader");

html5QrCode.start({facingMode:"environment"},{fps:20,qrbox:250},
text=>{
stopScan();
beep.play();
sendData(orderId,text);
status.innerText="Done ✅";
setTimeout(resetFlow,800);
});

}

}

function stopScan(){
if(html5QrCode) html5QrCode.stop().catch(()=>{});
}

// ===== MANUAL =====
function openManual(){manualBox.style.display="block";}
function submitManual(){
let o=manualOrder.value.trim();
let t=manualTracking.value.trim();
if(!o||!t)return alert("Fill both");
sendData(o,t);
resetFlow();
}

// ===== RESET =====
function resetFlow(){
orderId="";
manualOrder.value="";
manualTracking.value="";
manualBox.style.display="none";
status.innerText="Ready...";
document.querySelector(".start").innerText="Start";
step="order";
}

// ===== SEND =====
function sendData(o,t){
fetch(API.post,{
method:"POST",
body:JSON.stringify({mode:mode.toLowerCase(),order_id:o,tracking:t})
})
.then(r=>r.json())
.then(res=>{
if(res.error){status.innerHTML="❌ "+res.error;return;}
if(res.duplicate){status.innerHTML="⚠️ Duplicate";return;}
status.innerHTML="✅ Saved";
loadDashboard();
});
}

// ===== DASHBOARD =====
function loadDashboard(){
fetch(API.stats)
.then(r=>r.json())
.then(d=>{
pickup_today.innerText=d.todayPickup||0;
return_today.innerText=d.todayReturn||0;
pickup_yesterday.innerText=d.yesterdayPickup||0;
return_yesterday.innerText=d.yesterdayReturn||0;
pickup_total.innerText=d.totalPickup||0;
return_total.innerText=d.totalReturn||0;
});
}

// ===== LOOKUP =====
function lookup(){

let order=lookupOrder.value.trim();
if(!order)return alert("Enter Order");

lookupResult.innerHTML="Loading...";

fetch(API.lookup(order))
.then(r=>r.json())
.then(data=>{

if(!Array.isArray(data)) data=[];

let html="", total=0;

data.forEach(i=>{
let qty=Number(i.qty)||0;
total+=qty;

html+=`
<b>${i.sku}</b> - ${i.product}<br>
Qty: ${qty}<hr>`;
});

lookupResult.innerHTML=html+`<b>Total: ${total}</b>`;
});
}

// ===== TRACK =====
function trackOrder(){

let o=trackOrderId.value.trim();
let t=trackWaybill.value.trim();

fetch(API.track(o,t))
.then(r=>r.json())
.then(d=>{

trackingData=d;

let amt=d.amount||0;
if(d.payment==="Prepaid"){
amt=amt-(amt*0.025*1.18);
}

trackResult.innerHTML=`
Status: ${d.status}<br>
Customer: ${d.customer}<br>
Amount: ₹${amt.toFixed(2)}
`;

settledAmount.value=amt.toFixed(2);
settledDate.value=new Date().toISOString().split('T')[0];

extraBox.style.display="block";
saveBtn.style.display="block";

});
}

// ===== SAVE =====
function saveTracking(){
fetch(API.post,{
method:"POST",
body:JSON.stringify({type:"saveTracking",...trackingData})
})
.then(()=>alert("Saved ✅"));
}

// ===== REFRESH =====
function refreshPage(){location.reload();}

// AUTO LOAD
loadDashboard();
setInterval(loadDashboard,3000);

</script>

</body>
</html>
