<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:'Segoe UI'; background:linear-gradient(135deg,#eef2f7,#dfe9f3); }
.container { max-width:600px; margin:20px auto; }
.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; }

input { width:100%; padding:10px; margin-top:5px; }

button { width:100%; padding:10px; margin-top:10px; background:#ffc107; border:none; }
</style>
</head>

<body>

<div class="container">

<h2>🧵 Stitching</h2>

<div class="card">
<input id="labour" placeholder="Labour Name">
<input id="pcs" type="number" placeholder="PCS">
<button onclick="save()">Save</button>
</div>

<div class="card" id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("stitchingData")) || [];

function save(){
let labour=labourEl.value;
let pcs=parseInt(pcsEl.value);

if(!labour||!pcs){alert("Fill");return;}

data.push({labour,total:pcs});

localStorage.setItem("stitchingData",JSON.stringify(data));

load();
}

function load(){
list.innerHTML="";
data.forEach(d=>{
list.innerHTML+=`<div>${d.labour} - ${d.total} pcs</div>`;
});
}

const labourEl=document.getElementById("labour");
const pcsEl=document.getElementById("pcs");

load();
</script>

</body>
</html>
