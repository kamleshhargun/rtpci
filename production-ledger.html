<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Ledger</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.container{max-width:1000px;margin:auto;}
h1{text-align:center;}

.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:20px;}

input{padding:8px;margin:5px;}

button{padding:6px 10px;border:none;border-radius:5px;color:#fff;cursor:pointer;}
.add{background:green;}
.delete{background:red;}
.edit{background:orange;}

.list div{
  background:#fafafa;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">
<h1>📒 Production Ledger</h1>

<div class="box">
<h3>Party</h3>
<input id="partyInput">
<button class="add" onclick="add('party','partyInput')">Add</button>
<div id="partyList" class="list"></div>
</div>

<div class="box">
<h3>Fabric</h3>
<input id="fabricInput">
<button class="add" onclick="add('fabric','fabricInput')">Add</button>
<div id="fabricList" class="list"></div>
</div>

<div class="box">
<h3>SKU</h3>
<input id="skuInput">
<button class="add" onclick="add('sku','skuInput')">Add</button>
<div id="skuList" class="list"></div>
</div>

<div class="box">
<h3>Labour</h3>
<input id="labourInput">
<button class="add" onclick="add('labour','labourInput')">Add</button>
<div id="labourList" class="list"></div>
</div>

</div>

<script src="config.js"></script>
<script>

// ===== LOAD =====
async function load(category, container){

let res = await fetch(API + "?type=ledger&category=" + category);
let data = await res.json();

let box = document.getElementById(container);
box.innerHTML="";

data.forEach(d=>{
box.innerHTML += `
<div>
  ${d.name}
  <div>
    <button class="edit" onclick="edit('${category}',${d.id},'${d.name}')">Edit</button>
    <button class="delete" onclick="del('${category}',${d.id})">X</button>
  </div>
</div>
`;
});
}

// ===== ADD =====
async function add(category,inputId){

let val = document.getElementById(inputId).value.trim();
if(!val) return alert("Enter value");

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:"ledger",
action:"add",
category:category,
name:val
})
});

document.getElementById(inputId).value="";
refresh();
}

// ===== DELETE =====
async function del(category,id){

if(!confirm("Delete this item?")) return;

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:"ledger",
action:"delete",
category:category,
id:id
})
});

refresh();
}

// ===== EDIT =====
async function edit(category,id,oldVal){

let newVal = prompt("Edit value", oldVal);
if(!newVal || newVal===oldVal) return;

await fetch(API,{
method:"POST",
body:JSON.stringify({
type:"ledger",
action:"edit",
category:category,
id:id,
name:newVal
})
});

refresh();
}

// ===== REFRESH =====
function refresh(){
load("party","partyList");
load("fabric","fabricList");
load("sku","skuList");
load("labour","labourList");
}

refresh();

</script>

</body>
</html>
