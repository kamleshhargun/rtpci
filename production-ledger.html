<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Ledger</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.container{max-width:1000px;margin:auto;}
h1{text-align:center;}

.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:20px;}

input{padding:8px;margin:5px;}

button{padding:6px 10px;border:none;border-radius:5px;color:#fff;cursor:pointer;}
.add{background:green;}
.delete{background:red;}
.edit{background:orange;}

.list div{
  background:#fafafa;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">
<h1>📒 Production Ledger</h1>

<div class="box">
<h3>Party</h3>
<input id="partyInput">
<button class="add" onclick="add('Sheet6','partyInput')">Add</button>
<div id="partyList" class="list"></div>
</div>

<div class="box">
<h3>Fabric</h3>
<input id="fabricInput">
<button class="add" onclick="add('Sheet7','fabricInput')">Add</button>
<div id="fabricList" class="list"></div>
</div>

<div class="box">
<h3>SKU</h3>
<input id="skuInput">
<button class="add" onclick="add('Sheet8','skuInput')">Add</button>
<div id="skuList" class="list"></div>
</div>

<div class="box">
<h3>Labour</h3>
<input id="labourInput">
<button class="add" onclick="add('Sheet9','labourInput')">Add</button>
<div id="labourList" class="list"></div>
</div>

</div>

<script>

// ===== LOAD =====
async function load(sheet, container){
  let res = await fetch(API + "?type=get&sheet=" + sheet);
  let data = await res.json();

  let box = document.getElementById(container);
  box.innerHTML="";

  data.forEach(d=>{
    box.innerHTML += `
      <div>
        ${d}
        <div>
          <button class="edit" onclick="edit('${sheet}','${d}')">Edit</button>
          <button class="delete" onclick="del('${sheet}','${d}')">X</button>
        </div>
      </div>
    `;
  });
}

// ===== ADD =====
async function add(sheet,inputId){
  let val = document.getElementById(inputId).value.trim();
  if(!val) return alert("Enter value");

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      sheet:sheet,
      value:val
    })
  });

  document.getElementById(inputId).value="";
  refresh();
}

// ===== DELETE =====
async function del(sheet,val){
  if(!confirm("Delete this item?")) return;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      sheet:sheet,
      value:val
    })
  });

  refresh();
}

// ===== EDIT =====
async function edit(sheet,oldVal){
  let newVal = prompt("Edit value", oldVal);
  if(!newVal || newVal === oldVal) return;

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"edit",
      sheet:sheet,
      oldValue:oldVal,
      newValue:newVal
    })
  });

  refresh();
}

// ===== REFRESH =====
function refresh(){
  load("Sheet6","partyList");
  load("Sheet7","fabricList");
  load("Sheet8","skuList");
  load("Sheet9","labourList");
}

refresh();

</script>

</body>
</html>
