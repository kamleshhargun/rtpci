<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production Ledger</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.container{max-width:1000px;margin:auto;}
h1{text-align:center;}

.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:20px;}

input{padding:8px;margin:5px;}

button{padding:8px 12px;border:none;border-radius:5px;color:#fff;cursor:pointer;}
.add{background:green;}
.delete{background:red;}

.list div{
  background:#fafafa;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">
<h1>📒 Production Ledger</h1>

<!-- PARTY -->
<div class="box">
<h3>Party</h3>
<input id="partyInput" placeholder="Party Name">
<button class="add" onclick="addItem('parties','partyInput')">Add</button>
<div id="partyList" class="list"></div>
</div>

<!-- FABRIC -->
<div class="box">
<h3>Fabric</h3>
<input id="fabricInput" placeholder="Fabric Name">
<button class="add" onclick="addItem('fabrics','fabricInput')">Add</button>
<div id="fabricList" class="list"></div>
</div>

<!-- SKU -->
<div class="box">
<h3>SKU</h3>
<input id="skuInput" placeholder="SKU Name">
<button class="add" onclick="addItem('skus','skuInput')">Add</button>
<div id="skuList" class="list"></div>
</div>

<!-- LABOUR -->
<div class="box">
<h3>Labour</h3>
<input id="labourInput" placeholder="Labour Name">
<button class="add" onclick="addItem('labours','labourInput')">Add</button>
<div id="labourList" class="list"></div>
</div>

</div>

<script>

function getData(key){
  return JSON.parse(localStorage.getItem(key)) || [];
}

function saveData(key,data){
  localStorage.setItem(key,JSON.stringify(data));
}

// ADD
function addItem(key,inputId){
  let val=document.getElementById(inputId).value.trim();
  if(!val)return alert("Enter value");

  let data=getData(key);

  if(data.includes(val)){
    alert("Already exists");
    return;
  }

  data.push(val);
  saveData(key,data);

  document.getElementById(inputId).value="";
  renderAll();
}

// DELETE
function deleteItem(key,index){
  let data=getData(key);
  data.splice(index,1);
  saveData(key,data);
  renderAll();
}

// RENDER
function render(key,container){
  let data=getData(key);
  let div=document.getElementById(container);
  div.innerHTML="";

  data.forEach((d,i)=>{
    div.innerHTML+=`
      <div>
        ${d}
        <button class="delete" onclick="deleteItem('${key}',${i})">X</button>
      </div>
    `;
  });
}

function renderAll(){
  render("parties","partyList");
  render("fabrics","fabricList");
  render("skus","skuList");
  render("labours","labourList");
}

renderAll();

</script>

</body>
</html>
