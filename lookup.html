<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 420px;
  margin: 40px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#6f42c1;
  color:#fff;
  border:none;
  cursor:pointer;
}

#result {
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Lookup</h2>

<div class="card">
<input id="order" placeholder="Order ID">
<button onclick="search()">Search</button>
</div>

<div class="card" id="result">Enter Order ID</div>

</div>
<script src="config.js"></script>
<script>
function search(){

let order=document.getElementById("order").value.trim();

if(!order){
  alert("Enter Order");
  return;
}

let box=document.getElementById("result");
box.innerHTML="Loading...";

fetch(API.lookup(order))
.then(r=>r.json())
.then(data=>{

// 🔥 ERROR HANDLE
if(data.error){
  box.innerHTML="❌ " + data.error;
  return;
}

// 🔥 FORCE ARRAY FIX
if(!Array.isArray(data)){
  data = [];
}

// 🔥 FILTER EXACT MATCH (IMPORTANT)
let filtered = data.filter(i =>
  String(i.order_id).trim().toLowerCase() === order.toLowerCase()
);

// अगर exact नहीं मिला तो partial दिखाओ
if(filtered.length === 0){
  filtered = data;
}

// 🔥 EMPTY CHECK
if(filtered.length === 0){
  box.innerHTML="❌ No Data Found";
  return;
}

// 🔥 SORT (optional but clean)
filtered.sort((a,b)=> a.sku.localeCompare(b.sku));

let html="";
let total=0;

filtered.forEach(i=>{

  let qty = Number(i.qty) || 0;
  total += qty;

  html += `
  <div style="padding:8px 0;">
    <b>Order:</b> ${i.order_id}<br>
    <b>SKU:</b> ${i.sku}<br>
    <b>Product:</b> ${i.product}<br>
    <b>Qty:</b> ${qty}
    <hr>
  </div>
  `;
});

// 🔥 TOTAL
html += `
<div style="padding:10px; font-weight:bold;">
Total Qty: ${total}
</div>
`;

box.innerHTML = html;

})
.catch(err=>{
  box.innerHTML="❌ Error loading data";
  console.error(err);
});

}
//HTML REFRESH
  function refreshPage(){

  // ✅ Return Request Page
  if (typeof loadData === "function") {
    loadData();
    console.log("Return data refreshed");
  }

  // ✅ Scanner Dashboard
  if (typeof loadDashboard === "function") {
    loadDashboard();
    console.log("Dashboard refreshed");
  }

  // ✅ Tracking Page
  if (typeof trackOrder === "function" && trackingData) {
    trackOrder();
    console.log("Tracking refreshed");
  }

  // ✅ Extra safety (agar kuch bhi na mile)
  if (
    typeof loadData !== "function" &&
    typeof loadDashboard !== "function"
  ){
    console.log("Fallback reload");
    location.reload(); // last option
  }
}
</script>

</body>
</html>
