<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production ERP</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.menu{display:flex;background:#111;}
.menu a{flex:1;padding:12px;color:#fff;text-align:center;cursor:pointer;}
.menu a.active{background:#007bff;}

.section{display:none;padding:20px;}
.section.active{display:block;}

.container{max-width:1200px;margin:auto;}
.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;}

input,select{padding:8px;margin:5px;}
button{padding:8px 12px;border:none;color:#fff;border-radius:5px;cursor:pointer;}
.add{background:green;}
.save{background:black;}
.delete{background:red;}
.edit{background:orange;}

table{width:100%;border-collapse:collapse;background:#fff;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;}
.drawer{display:none;background:#fafafa;}
</style>
</head>

<body>

<div class="menu">
<a class="active" onclick="openTab('fabric',this)">Fabric</a>
<a onclick="openTab('cutting',this)">Cutting</a>
<a onclick="openTab('stitching',this)">Stitching</a>
<a onclick="openTab('finished',this)">Finished</a>
</div>

<!-- ================= FABRIC ================= -->
<div id="fabric" class="section active">
<div class="container">

<div class="box">
<h3>Fabric Purchase</h3>

<select id="party"></select>
<select id="fabricSelect"></select>
<input id="meter" placeholder="Meter">
<button class="save" onclick="saveFabric()">Save</button>

</div>

<table>
<thead><tr>
<th>Party</th><th>Fabric</th><th>Meter</th><th>Action</th>
</tr></thead>
<tbody id="fabricTable"></tbody>
</table>

</div>
</div>

<!-- ================= CUTTING ================= -->
<div id="cutting" class="section">
<div class="container">

<div class="box">
<h3>Cutting</h3>

<select id="cutFabric"></select>
<input id="cutSku" list="skuList">
<datalist id="skuList"></datalist>
<input id="cutQty" placeholder="Qty">
<button class="save" onclick="saveCutting()">Save</button>

</div>

<table>
<thead><tr>
<th>Fabric</th><th>SKU</th><th>Qty</th>
</tr></thead>
<tbody id="cutTable"></tbody>
</table>

</div>
</div>

<!-- ================= STITCHING ================= -->
<div id="stitching" class="section">
<div class="container">

<div class="box">
<h3>Stitching</h3>

<select id="labour"></select>
<input id="stitchSku" list="skuList2">
<datalist id="skuList2"></datalist>
<input id="stitchQty" placeholder="Qty">
<button class="save" onclick="saveStitching()">Save</button>

</div>

<table>
<thead><tr>
<th>Labour</th><th>SKU</th><th>Qty</th>
</tr></thead>
<tbody id="stitchTable"></tbody>
</table>

</div>
</div>

<!-- ================= FINISHED ================= -->
<div id="finished" class="section">
<div class="container">

<div class="box">
<h3>Finished Goods</h3>

<select id="labour2"></select>
<input id="finishSku">
<input id="finishQty" placeholder="Qty">
<button class="save" onclick="saveFinished()">Save</button>

</div>

<table>
<thead><tr>
<th>Labour</th><th>SKU</th><th>Qty</th>
</tr></thead>
<tbody id="finishTable"></tbody>
</table>

</div>
</div>

<script>

// ================= TAB =================
function openTab(id,el){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
el.classList.add("active");
}

// ================= LEDGER =================
function loadLedger(){
let parties=JSON.parse(localStorage.getItem("parties"))||[];
let fabrics=JSON.parse(localStorage.getItem("fabrics"))||[];
let skus=JSON.parse(localStorage.getItem("skus"))||[];
let labours=JSON.parse(localStorage.getItem("labours"))||[];

party.innerHTML=parties.map(p=>`<option>${p}</option>`).join("");
fabricSelect.innerHTML=fabrics.map(f=>`<option>${f}</option>`).join("");
cutFabric.innerHTML=fabrics.map(f=>`<option>${f}</option>`).join("");

skuList.innerHTML=skus.map(s=>`<option value="${s}">`).join("");
skuList2.innerHTML=skus.map(s=>`<option value="${s}">`).join("");

labour.innerHTML=labours.map(l=>`<option>${l}</option>`).join("");
labour2.innerHTML=labours.map(l=>`<option>${l}</option>`).join("");
}

// ================= STORAGE =================
let fabricData=JSON.parse(localStorage.getItem("fabricData"))||[];
let cuttingData=JSON.parse(localStorage.getItem("cuttingData"))||[];
let stitchingData=JSON.parse(localStorage.getItem("stitchingData"))||[];
let finishedData=JSON.parse(localStorage.getItem("finishedData"))||[];

// ================= FABRIC =================
function saveFabric(){
let obj={
party:party.value,
fabric:fabricSelect.value,
meter:Number(meter.value)
};

fabricData.push(obj);
localStorage.setItem("fabricData",JSON.stringify(fabricData));
renderFabric();
}

function renderFabric(){
fabricTable.innerHTML="";
fabricData.forEach((f,i)=>{
fabricTable.innerHTML+=`
<tr>
<td>${f.party}</td>
<td>${f.fabric}</td>
<td>${f.meter}</td>
<td><button class="delete" onclick="deleteFabric(${i})">X</button></td>
</tr>`;
});
}

function deleteFabric(i){
fabricData.splice(i,1);
localStorage.setItem("fabricData",JSON.stringify(fabricData));
renderFabric();
}

// ================= CUTTING =================
function saveCutting(){
let obj={
fabric:cutFabric.value,
sku:cutSku.value,
qty:Number(cutQty.value)
};

cuttingData.push(obj);
localStorage.setItem("cuttingData",JSON.stringify(cuttingData));
renderCut();
}

function renderCut(){
cutTable.innerHTML="";
cuttingData.forEach(c=>{
cutTable.innerHTML+=`
<tr>
<td>${c.fabric}</td>
<td>${c.sku}</td>
<td>${c.qty}</td>
</tr>`;
});
}

// ================= STITCHING =================
function saveStitching(){
let obj={
labour:labour.value,
sku:stitchSku.value,
qty:Number(stitchQty.value)
};

stitchingData.push(obj);
localStorage.setItem("stitchingData",JSON.stringify(stitchingData));
renderStitch();
}

function renderStitch(){
stitchTable.innerHTML="";
stitchingData.forEach(s=>{
stitchTable.innerHTML+=`
<tr>
<td>${s.labour}</td>
<td>${s.sku}</td>
<td>${s.qty}</td>
</tr>`;
});
}

// ================= FINISHED =================
function saveFinished(){
let obj={
labour:labour2.value,
sku:finishSku.value,
qty:Number(finishQty.value)
};

finishedData.push(obj);
localStorage.setItem("finishedData",JSON.stringify(finishedData));
renderFinish();
}

function renderFinish(){
finishTable.innerHTML="";
finishedData.forEach(f=>{
finishTable.innerHTML+=`
<tr>
<td>${f.labour}</td>
<td>${f.sku}</td>
<td>${f.qty}</td>
</tr>`;
});
}

// ================= INIT =================
loadLedger();
renderFabric();
renderCut();
renderStitch();
renderFinish();

window.addEventListener("focus",loadLedger);

</script>

</body>
</html>
