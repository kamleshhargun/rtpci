<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Production</title>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.row{display:flex;gap:10px;margin-bottom:5px;}
.menu{display:flex;background:#111;}
.menu a{flex:1;padding:12px;color:#fff;text-align:center;cursor:pointer;}
.menu a.active{background:#007bff;}

.section{display:none;padding:20px;}
.section.active{display:block;}

.container{max-width:1200px;margin:auto;}
.box{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px;}

input,select{padding:8px;margin:5px;}
button{padding:8px 12px;border:none;color:#fff;border-radius:5px;cursor:pointer;}

.add{background:green;}
.save{background:black;}
.delete{background:red;}

table{width:100%;border-collapse:collapse;background:#fff;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;}
</style>
</head>

<body>

<!-- ================= MENU ================= -->
<div class="menu">
<a class="active" onclick="openTab('fabric',this)">Fabric</a>
<a onclick="openTab('cutting',this)">Cutting</a>
<a onclick="openTab('stitching',this)">Stitching</a>
<a onclick="openTab('finished',this)">Finished</a>
</div>

<!-- ================= FABRIC ================= -->
<div id="fabric" class="section active">
<div class="container">

<div class="box">
<h3>Fabric Purchase</h3>

<input type="date" id="date">

<br>

<input list="partyList" id="party" placeholder="Party Name">

<br>

<div id="fabricRows"></div>

<button onclick="addRow()" class="add">+ Add Fabric</button>

<br><br>

<input id="gst" value="5" placeholder="GST %">

<br><br>

<button class="save" onclick="saveInvoice()">Save</button>

</div>

<table>
<thead>
<tr>
<th>Party</th>
<th>Date</th>
<th>Subtotal</th>
<th>GST</th>
<th>Total</th>
</tr>
</thead>
<tbody id="fabricTable"></tbody>
</table>
</div>
</div>

<table>
<thead><tr><th>Party</th><th>Fabric</th><th>Meter</th><th>Action</th></tr></thead>
<tbody id="fabricTable"></tbody>
</table>

</div>
</div>

<!-- ================= CUTTING ================= -->
<div id="cutting" class="section">
<div class="container">

<div class="box">
<h3>Cutting</h3>

<select id="cutFabric"></select>

<input list="skuList" id="cutSku">
<datalist id="skuList"></datalist>

<input id="cutQty" placeholder="Qty">

<button class="save" onclick="saveCutting()">Save</button>

</div>

<table>
<thead><tr><th>Fabric</th><th>SKU</th><th>Qty</th></tr></thead>
<tbody id="cutTable"></tbody>
</table>

</div>
</div>

<!-- ================= STITCHING ================= -->
<div id="stitching" class="section">
<div class="container">

<div class="box">
<h3>Stitching</h3>

<select id="labour"></select>

<input list="skuList2" id="stitchSku">
<datalist id="skuList2"></datalist>

<input id="stitchQty" placeholder="Qty">

<button class="save" onclick="saveStitching()">Save</button>

</div>

<table>
<thead><tr><th>Labour</th><th>SKU</th><th>Qty</th></tr></thead>
<tbody id="stitchTable"></tbody>
</table>

</div>
</div>

<!-- ================= FINISHED ================= -->
<div id="finished" class="section">
<div class="container">

<div class="box">
<h3>Finished Goods</h3>

<select id="labour2"></select>

<input list="skuList3" id="finishSku">
<datalist id="skuList3"></datalist>

<input id="finishQty" placeholder="Qty">

<button class="save" onclick="saveFinished()">Save</button>

</div>

<table>
<thead><tr><th>Labour</th><th>SKU</th><th>Qty</th></tr></thead>
<tbody id="finishTable"></tbody>
</table>

</div>
</div>

<script src="config.js"></script>
<script>

// ================= TAB =================
function openTab(id,el){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
el.classList.add("active");
}

// ================= LEDGER LOAD (API BASED) =================
let parties=[], fabrics=[], skus=[], labours=[];

async function loadLedger(){

try{

// API CALLS
let [p,f,s,l] = await Promise.all([
fetch(API.ledgerGet("party")).then(r=>r.json()),
fetch(API.ledgerGet("fabric")).then(r=>r.json()),
fetch(API.ledgerGet("sku")).then(r=>r.json()),
fetch(API.ledgerGet("labour")).then(r=>r.json())
]);

// STORE VALUES
parties = p.map(x=>x.name);
fabrics = f.map(x=>x.name);
skus = s.map(x=>x.name);
labours = l.map(x=>x.name);

// BIND TO UI
partyList.innerHTML = parties.map(p=>`<option value="${p}">`).join("");
fabricList.innerHTML = fabrics.map(f=>`<option value="${f}">`).join("");

skuList.innerHTML = skus.map(s=>`<option value="${s}">`).join("");
skuList2.innerHTML = skus.map(s=>`<option value="${s}">`).join("");
skuList3.innerHTML = skus.map(s=>`<option value="${s}">`).join("");

cutFabric.innerHTML = fabrics.map(f=>`<option>${f}</option>`).join("");

labour.innerHTML = labours.map(l=>`<option>${l}</option>`).join("");
labour2.innerHTML = labours.map(l=>`<option>${l}</option>`).join("");

}catch(err){
alert("Ledger Load Error");
console.error(err);
}

}

// ================= VALIDATION =================
function checkValid(val, list){
return list.includes(val);
}

// ================= STORAGE (LOCAL FOR NOW) =================
let fabricData=JSON.parse(localStorage.getItem("fabricData"))||[];
let cuttingData=JSON.parse(localStorage.getItem("cuttingData"))||[];
let stitchingData=JSON.parse(localStorage.getItem("stitchingData"))||[];
let finishedData=JSON.parse(localStorage.getItem("finishedData"))||[];

// ================= STOCK =================
function getStock(){

let stock = {};

fabricData.forEach(f=>{
if(!stock[f.fabric]) stock[f.fabric]=0;
stock[f.fabric]+=f.meter;
});

cuttingData.forEach(c=>{
if(stock[c.fabric]) stock[c.fabric]-=c.qty;
});

return stock;
}

// ================= FABRIC INVOICE =================
let fabricInvoices = JSON.parse(localStorage.getItem("fabricInvoices")) || [];

// AUTO DATE + FOCUS
window.addEventListener("load", ()=>{
let today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;
document.getElementById("party").focus();
});

// ADD ROW
function addRow(name="", meter="", rate=""){

let div = document.createElement("div");
div.className = "row";

div.innerHTML = `
<input list="fabricList" class="fabric" placeholder="Fabric" value="${name}">
<input type="number" class="meter" placeholder="Meter" value="${meter}">
<input type="number" class="rate" placeholder="Rate" value="${rate}">
<button class="delete" onclick="this.parentElement.remove()">X</button>
`;

document.getElementById("fabricRows").appendChild(div);
}

// SAVE INVOICE
function saveInvoice(){

let party = partyInput();
let date = dateInput();
let gst = Number(document.getElementById("gst").value) || 5;

let rows = document.querySelectorAll("#fabricRows .row");

let fabricsArr = [];
let subtotal = 0;

rows.forEach(r=>{
let name = r.querySelector(".fabric").value;
let meter = Number(r.querySelector(".meter").value);
let rate = Number(r.querySelector(".rate").value);

if(name && meter && rate){

if(!checkValid(name,fabrics)){
alert("Invalid Fabric: " + name);
return;
}

let amount = meter * rate;
subtotal += amount;

fabricsArr.push({name, meter, rate, amount});
}
});

if(!party || fabricsArr.length===0){
alert("Fill required fields");
return;
}

let gstAmount = subtotal * gst / 100;
let total = subtotal + gstAmount;

fabricInvoices.push({
party, date, gst, subtotal, gstAmount, total, fabrics:fabricsArr
});

localStorage.setItem("fabricInvoices", JSON.stringify(fabricInvoices));

renderFabric();
clearForm();
}

// RENDER
function renderFabric(){

fabricTable.innerHTML="";

fabricInvoices.forEach((inv,i)=>{

let row = `
<tr onclick="toggle(${i})">
<td>${inv.party}</td>
<td>${inv.date}</td>
<td>${inv.subtotal}</td>
<td>${inv.gst}%</td>
<td>${inv.total}</td>
</tr>
`;

let drawer = `
<tr id="d-${i}" class="drawer">
<td colspan="5">

<table width="100%">
<tr><th>Fabric</th><th>Meter</th><th>Rate</th><th>Amount</th></tr>

${inv.fabrics.map(f=>`
<tr>
<td>${f.name}</td>
<td>${f.meter}</td>
<td>${f.rate}</td>
<td>${f.amount}</td>
</tr>
`).join("")}

</table>

<br>
Subtotal: ${inv.subtotal} | GST: ${inv.gstAmount} | Total: ${inv.total}

</td>
</tr>
`;

fabricTable.innerHTML += row + drawer;

});
}

// TOGGLE
function toggle(i){
let d = document.getElementById("d-"+i);
d.style.display = d.style.display==="table-row" ? "none" : "table-row";
}

// CLEAR
function clearForm(){
document.getElementById("party").value="";
document.getElementById("fabricRows").innerHTML="";
document.getElementById("gst").value="5";
addRow();
document.getElementById("party").focus();
}

// HELPERS
function partyInput(){ return document.getElementById("party").value; }
function dateInput(){ return document.getElementById("date").value; }

// ================= STITCHING =================
function saveStitching(){

if(!checkValid(stitchSku.value, skus)) return alert("Invalid SKU");

stitchingData.push({
labour:labour.value,
sku:stitchSku.value,
qty:Number(stitchQty.value)
});

localStorage.setItem("stitchingData",JSON.stringify(stitchingData));
renderStitch();
}

function renderStitch(){
stitchTable.innerHTML="";
stitchingData.forEach(s=>{
stitchTable.innerHTML+=`
<tr>
<td>${s.labour}</td>
<td>${s.sku}</td>
<td>${s.qty}</td>
</tr>`;
});
}

// ================= FINISHED =================
function saveFinished(){

if(!checkValid(finishSku.value, skus)) return alert("Invalid SKU");

finishedData.push({
labour:labour2.value,
sku:finishSku.value,
qty:Number(finishQty.value)
});

localStorage.setItem("finishedData",JSON.stringify(finishedData));
renderFinish();
}

function renderFinish(){
finishTable.innerHTML="";
finishedData.forEach(f=>{
finishTable.innerHTML+=`
<tr>
<td>${f.labour}</td>
<td>${f.sku}</td>
<td>${f.qty}</td>
</tr>`;
});
}

// ================= INIT =================
loadLedger();
addRow();
renderFabric();
renderStitch();
renderFinish();

// 🔥 IMPORTANT
window.addEventListener("focus",loadLedger);

</script>

</body>
</html>
