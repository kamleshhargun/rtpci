<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 600px;
  margin: 20px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#28a745;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>🧵 Fabric Purchase</h2>

<div class="card">
<input id="name" placeholder="Fabric Name">
<input id="meter" type="number" placeholder="Meter">
<button onclick="save()">Save</button>
</div>

<div class="card" id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("fabricInvoices")) || [];

function save(){
let name=nameEl.value;
let meter=parseFloat(meterEl.value);

if(!name||!meter){alert("Fill");return;}

data.push({name,meter});

localStorage.setItem("fabricInvoices",JSON.stringify(data));

load();
}

function load(){
list.innerHTML="";
data.forEach(d=>{
list.innerHTML+=`<div>${d.name} - ${d.meter}m</div>`;
});
}

const nameEl=document.getElementById("name");
const meterEl=document.getElementById("meter");

load();
</script>

</body>
</html>
