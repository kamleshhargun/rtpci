<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== GLOBAL ===== */
body {
  font-family: 'Segoe UI', Arial;
  margin: 0;
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  color:#333;
}

/* ===== TOP MENU ===== */
.menu {
  display:flex;
  flex-wrap:wrap;
  background:#1f2937;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.menu a {
  flex:1;
  padding:12px;
  text-align:center;
  color:#e5e7eb;
  text-decoration:none;
  cursor:pointer;
  transition:0.3s;
  font-weight:500;
}

.menu a:hover {
  background:#374151;
}

.menu a.active {
  background:#007bff;
  color:#fff;
  font-weight:600;
}

/* ===== SECTION ===== */
.section {
  display:none;
  padding:20px;
  animation:fadeIn 0.3s ease;
}

.section.active {
  display:block;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

/* ===== CONTAINER ===== */
.container {
  max-width:1200px;
  margin:auto;
}

/* ===== HEADINGS ===== */
h1 {
  text-align:center;
  margin-bottom:15px;
  color:#1f2937;
}

/* ===== FORM BOX ===== */
.form-box {
  background:#fff;
  padding:18px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* ===== INPUT ===== */
input, select {
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
  transition:0.2s;
}

input:focus, select:focus {
  outline:none;
  border-color:#007bff;
  box-shadow:0 0 5px rgba(0,123,255,0.3);
}

/* ===== BUTTON ===== */
button {
  padding:9px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  transition:0.2s;
}

button:hover {
  transform:translateY(-1px);
  opacity:0.9;
}

.add-btn { background:#28a745;}
.delete-btn { background:#dc3545;}
.edit-btn { background:#ffc107; color:#000;}
.save-btn { background:#111827;}

/* ===== TABLE ===== */
table {
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

th {
  background:#1f2937;
  color:#fff;
}

th, td {
  border:1px solid #eee;
  padding:12px;
  text-align:center;
}

tr:hover {
  background:#f9fafb;
}

/* ===== DRAWER ===== */
.drawer {
  display:none;
  background:#f3f4f6;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .menu a {
    flex:50%;
    font-size:12px;
  }

  .form-box {
    padding:12px;
  }

  input, select {
    width:95%;
  }

}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu">
  <a class="active" onclick="showPage('fabric')">Fabric</a>
  <a onclick="showPage('cutting')">Cutting</a>
  <a onclick="showPage('stitching')">Stitching</a>
  <a onclick="showPage('finished')">Finished</a>
</div>

<!-- ================= FABRIC ================= -->
<div id="fabric" class="section active">
<div class="container">
<h1>Fabric Purchase</h1>

<div class="form-box">
<input id="party" placeholder="Party">
<input id="invoice" placeholder="Invoice">
<input type="date" id="fdate">
<input id="gst" placeholder="GST %">

<div id="fabricContainer"></div>

<button class="add-btn" onclick="addFabricRow()">+ Add Fabric</button>
<button class="save-btn" onclick="saveInvoice()">Save</button>
</div>

<table>
<thead><tr>
<th>Party</th><th>Invoice</th><th>Date</th><th>Total</th><th>Action</th>
</tr></thead>
<tbody id="fabricTable"></tbody>
</table>
</div>
</div>

<!-- ================= CUTTING ================= -->
<div id="cutting" class="section">
<div class="container">
<h1>Cutting</h1>

<div class="form-box">
<select id="fabricSelect"></select>
<input type="date" id="cdate">

<div id="skuContainer"></div>
<button class="add-btn" onclick="addSkuRow()">+ SKU</button>

<input id="meter" placeholder="Meter Used">
<button class="save-btn" onclick="saveCutting()">Save</button>
</div>

<table>
<tbody id="cuttingTable"></tbody>
</table>
</div>
</div>

<!-- ================= STITCHING ================= -->
<div id="stitching" class="section">
<div class="container">
<h1>Stitching</h1>

<div class="form-box">
<input type="date" id="sdate">
<input id="labour" placeholder="Labour">

<div id="entryContainer"></div>
<button class="add-btn" onclick="addRow()">+ Add</button>

<button class="save-btn" onclick="saveStitching()">Save</button>
</div>

<table>
<tbody id="stitchingTable"></tbody>
</table>
</div>
</div>

<!-- ================= FINISHED ================= -->
<div id="finished" class="section">
<div class="container">
<h1>Finished</h1>

<div class="form-box">
<input type="date" id="fndate">
<select id="labourSelect" onchange="loadPending()"></select>

<div id="finishContainer"></div>

<button class="save-btn" onclick="saveFinished()">Save</button>
</div>

<table>
<tbody id="finishedTable"></tbody>
</table>
</div>
</div>

<script>

// NAVIGATION
function showPage(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".menu a").forEach(a=>a.classList.remove("active"));
  event.target.classList.add("active");
}

// STORAGE
let fabricData = JSON.parse(localStorage.getItem("fabric")) || [];
let cuttingData = JSON.parse(localStorage.getItem("cutting")) || [];
let stitchingData = JSON.parse(localStorage.getItem("stitching")) || [];
let finishedData = JSON.parse(localStorage.getItem("finished")) || [];

/* ================= FABRIC ================= */
function addFabricRow(){
  let div=document.createElement("div");
  div.innerHTML=`<input class="name"><input class="meter"><input class="rate">`;
  fabricContainer.appendChild(div);
}

function saveInvoice(){
  let fabrics=[];
  let total=0;

  document.querySelectorAll("#fabricContainer div").forEach(r=>{
    let m=r.children[1].value;
    let rate=r.children[2].value;
    let amt=m*rate;
    total+=amt;
    fabrics.push({m,rate});
  });

  fabricData.push({party:party.value,invoice:invoice.value,date:fdate.value,total,fabrics});
  localStorage.setItem("fabric",JSON.stringify(fabricData));
  renderFabric();
}

function renderFabric(){
  fabricTable.innerHTML="";
  fabricData.forEach(f=>{
    fabricTable.innerHTML+=`<tr><td>${f.party}</td><td>${f.invoice}</td><td>${f.date}</td><td>${f.total}</td></tr>`;
  });
}

/* ================= CUTTING ================= */
function addSkuRow(){
  let div=document.createElement("div");
  div.innerHTML=`<input class="sku"><input class="qty">`;
  skuContainer.appendChild(div);
}

function saveCutting(){
  cuttingData.push({fabric:fabricSelect.value,date:cdate.value});
  localStorage.setItem("cutting",JSON.stringify(cuttingData));
}

/* ================= STITCHING ================= */
function addRow(){
  let div=document.createElement("div");
  div.innerHTML=`<input class="item"><input class="qty">`;
  entryContainer.appendChild(div);
}

function saveStitching(){
  stitchingData.push({labour:labour.value,date:sdate.value});
  localStorage.setItem("stitching",JSON.stringify(stitchingData));
}

/* ================= FINISHED ================= */
function loadPending(){
  finishContainer.innerHTML="Pending loaded...";
}

function saveFinished(){
  finishedData.push({date:fndate.value});
  localStorage.setItem("finished",JSON.stringify(finishedData));
}

renderFabric();

</script>

</body>
</html>
