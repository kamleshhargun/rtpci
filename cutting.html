<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:'Segoe UI'; background:linear-gradient(135deg,#eef2f7,#dfe9f3); }
.container { max-width:600px; margin:20px auto; }
.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; }

input { width:100%; padding:10px; margin-top:5px; }

button { width:100%; padding:10px; margin-top:10px; background:#007bff; color:#fff; border:none; }
</style>
</head>

<body>

<div class="container">

<h2>✂️ Cutting</h2>

<div class="card">
<input id="fabric" placeholder="Fabric Name">
<input id="pcs" type="number" placeholder="Total PCS">
<button onclick="save()">Save</button>
</div>

<div class="card" id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("cuttingData")) || [];

function save(){
let fabric=fabricEl.value;
let pcs=parseInt(pcsEl.value);

if(!fabric||!pcs){alert("Fill");return;}

data.push({fabric,pcs});

localStorage.setItem("cuttingData",JSON.stringify(data));

load();
}

function load(){
list.innerHTML="";
data.forEach(d=>{
list.innerHTML+=`<div>${d.fabric} - ${d.pcs} pcs</div>`;
});
}

const fabricEl=document.getElementById("fabric");
const pcsEl=document.getElementById("pcs");

load();
</script>

</body>
</html>
