<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:'Segoe UI'; background:linear-gradient(135deg,#eef2f7,#dfe9f3); }
.container { max-width:600px; margin:20px auto; }
.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:10px; }

input { width:100%; padding:10px; margin-top:5px; }

button { width:100%; padding:10px; margin-top:10px; background:#28a745; color:#fff; border:none; }
</style>
</head>

<body>

<div class="container">

<h2>📦 Finished Goods</h2>

<div class="card">
<input id="item" placeholder="Item Name">
<input id="qty" type="number" placeholder="Quantity">
<button onclick="save()">Receive</button>
</div>

<div class="card" id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("finishedData")) || [];

function save(){
let item=itemEl.value;
let qty=parseInt(qtyEl.value);

if(!item||!qty){alert("Fill");return;}

data.push({item,qty});

localStorage.setItem("finishedData",JSON.stringify(data));

load();
}

function load(){
list.innerHTML="";
data.forEach(d=>{
list.innerHTML+=`<div>${d.item} - ${d.qty}</div>`;
});
}

const itemEl=document.getElementById("item");
const qtyEl=document.getElementById("qty");

load();
</script>

</body>
</html>
