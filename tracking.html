<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
}

.container {
  max-width: 420px;
  margin: 40px auto;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:5px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
}

.search { background:#6f42c1; color:#fff; }
.start { background:#28a745; color:#fff; }

#trackResult {
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Tracking</h2>

<div class="card">
<input id="order" placeholder="Order ID">
<input id="tracking" placeholder="Tracking">
<button class="search" onclick="track()">Track</button>
</div>

<div class="card" id="trackResult">Enter details</div>

<div class="card" id="extraBox" style="display:none;">
<label>Settled Amount</label>
<input id="settledAmount" readonly>

<label>Select Date</label>
<input type="date" id="settledDate">
</div>

<button class="start" id="saveBtn" onclick="save()" style="display:none;">Save</button>

</div>
<script src="config.js"></script>
<script>

// GLOBAL
let trackingData = null;

// ================= TRACK =================
async function track(){

  let o = order.value.trim();
  let t = tracking.value.trim();

  if(!o || !t){
    alert("Enter Order & Tracking");
    return;
  }

  trackResult.innerHTML = "Loading...";

  try{

    // 1️⃣ TRACK API
    let trackRes = await fetch(API.track(o,t));
    let trackData = await trackRes.json();

    if(trackData.error){
      trackResult.innerHTML = "❌ " + trackData.error;
      return;
    }

    // 2️⃣ LOOKUP API (Sheet2)
    let lookupRes = await fetch(API.lookup(o));
    let items = await lookupRes.json();

    let total = 0;
    let payment = "Prepaid";

    items.forEach(i=>{
      total += Number(i.amount || 0);

      if(String(i.payment).toLowerCase() === "cod"){
        payment = "COD";
      }
    });

    // 3️⃣ FINAL CALCULATION
    let finalAmount = total;

    if(payment === "Prepaid"){
      finalAmount = total - (total * 0.025 * 1.18);
    }

    // 4️⃣ SAVE READY DATA
    trackingData = {
      ...trackData,
      amount: finalAmount,
      payment: payment
    };

    // 5️⃣ UI SHOW
    trackResult.innerHTML = `
      <b>Status:</b> ${trackData.status}<br>
      <b>Location:</b> ${trackData.location}<br>
      <b>Customer:</b> ${trackData.customer}<br>
      <b>Payment:</b> ${payment}<br>
      <b>Amount:</b> ₹${finalAmount.toFixed(2)}
    `;

    // SETTLED DATA
    settledAmount.value = finalAmount.toFixed(2);
    settledDate.value = new Date().toISOString().split('T')[0];

    extraBox.style.display = "block";
    saveBtn.style.display = "block";

  }catch(err){
    console.error(err);
    trackResult.innerHTML = "❌ Error fetching data";
  }
}


// ================= SAVE =================
async function save(){

  if(!trackingData){
    alert("No data to save");
    return;
  }

  try{

    let res = await fetch(API.post,{
      method:"POST",
      body:JSON.stringify({
        type:"saveTracking",
        ...trackingData,
        settled_amount: settledAmount.value,
        settled_date: settledDate.value
      })
    });

    let json = await res.json();

    if(json.duplicate){
      alert("⚠️ Already saved tracking");
      return;
    }

    if(json.error){
      alert("❌ " + json.error);
      return;
    }

    alert("Saved ✅");

    resetAll();

  }catch(err){
    console.error(err);
    alert("❌ Save failed");
  }
}


// ================= RESET =================
function resetAll(){
  order.value = "";
  tracking.value = "";
  settledAmount.value = "";
  settledDate.value = "";

  trackResult.innerHTML = "Enter details";

  extraBox.style.display = "none";
  saveBtn.style.display = "none";

  trackingData = null;
}


// ================= REFRESH =================
function refreshPage(){

  // Return page
  if (typeof loadData === "function") {
    loadData();
    return;
  }

  // Dashboard
  if (typeof loadDashboard === "function") {
    loadDashboard();
    return;
  }

  // Tracking page
  if (trackingData) {
    track();
    return;
  }

  // fallback
  location.reload();
}


// ================= ENTER KEY SUPPORT =================
order.addEventListener("keypress", e=>{
  if(e.key === "Enter") tracking.focus();
});

tracking.addEventListener("keypress", e=>{
  if(e.key === "Enter") track();
});

</script>

</body>
</html>
